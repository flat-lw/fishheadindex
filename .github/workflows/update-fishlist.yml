name: Update fishList.json

on:
  schedule:
    - cron: "0 15 * * *"   # 毎日 JST 0:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Write service account credentials
        env:
          SA_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: echo "$SA_JSON" > pythonScripts/service_account.json

      - name: Run update scripts in nix devShell
        run: |
          nix develop --command bash -c '
            set -euo pipefail
            cd pythonScripts
            python listDownloader.py
            python fishListConverter.py
          '

      - name: Move outputs to repo root and clean up
        run: |
          mv pythonScripts/fishList.csv .
          mv pythonScripts/fishList.json .
          rm pythonScripts/service_account.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add fishList.csv fishList.json
          if git diff --staged --quiet; then
            echo "変更なし"
          else
            git commit -m "chore: auto-update fishList ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
